<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">TimeSpawner logo</title>
  <desc id="desc">A compact Minecraft-inspired TimeSpawner icon with a clock, mob spawner, zombie and skeleton.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10213d"/>
      <stop offset=".55" stop-color="#392542"/>
      <stop offset="1" stop-color="#0d160f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd44d"/>
      <stop offset="1" stop-color="#e37b00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="48" fill="url(#sky)"/>
